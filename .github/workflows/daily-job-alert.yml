name: Daily Job Alert Email

on:
  schedule:
    # 06:00 UTC = 07:00 BST (British Summer Time, UTC+1, late Mar–late Oct)
    # In winter (GMT, UTC+0) this fires at 06:00 — one hour early but acceptable
    - cron: "0 6 * * *"
  workflow_dispatch:  # manual trigger: Actions tab → Daily Job Alert Email → Run workflow

jobs:
  send-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r job-alerts/requirements.txt

      - name: Run job alert script
        working-directory: job-alerts
        env:
          ADZUNA_APP_ID:       ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:      ${{ secrets.ADZUNA_APP_KEY }}
          REED_API_KEY:        ${{ secrets.REED_API_KEY }}
          JOOBLE_API_KEY:      ${{ secrets.JOOBLE_API_KEY }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python job_alerts.py
